name: CD

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            deps: musl-tools
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        if: matrix.deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.deps }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf arcc-${{ matrix.target }}.tar.gz arcc${{ matrix.ext }}
          mv arcc-${{ matrix.target }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcc-${{ matrix.target }}
          path: arcc-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for tag to be discoverable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Waiting for tag $TAG via API..."
          for i in $(seq 1 20); do
            if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" --jq '.ref' 2>/dev/null | grep -q .; then
              echo "Tag $TAG is now discoverable via API (attempt $i)"
              sleep 3
              exit 0
            fi
            echo "Attempt $i/20 — tag not yet discoverable via API, waiting 3s..."
            sleep 3
          done
          echo "Tag $TAG never became discoverable via API"
          exit 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          for dir in arcc-*/; do
            cd "$dir" && sha256sum *.tar.gz >> ../checksums.txt && cd ..
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Creating release for $TAG..."

          # Create the release via API for reliability with tag eventual consistency
          RELEASE_JSON=$(gh api \
            --method POST \
            "repos/${{ github.repository }}/releases" \
            -f "tag_name=$TAG" \
            -f "name=ARCC $TAG" \
            -f "body=ARCC $TAG Release — Three-in-One Personal AI Assistant" \
            -F "draft=true" \
            -F "generate_release_notes=true")

          RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
          UPLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.upload_url' | sed 's/{?name,label}//')
          echo "Release created: ID=$RELEASE_ID"

          # Upload assets
          for asset in arcc-*/arcc-*.tar.gz checksums.txt; do
            echo "Uploading $asset..."
            gh api \
              --method POST \
              "$UPLOAD_URL" \
              -f "name=$(basename "$asset")" \
              --input "$asset" \
              --header "Content-Type: application/octet-stream" \
              -H "Accept: application/vnd.github+json" > /dev/null
          done
          echo "All assets uploaded successfully!"
